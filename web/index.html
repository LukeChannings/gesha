<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name='viewport' content='initial-scale=1, viewport-fit=cover'>
  <meta name="apple-mobile-web-app-title" content="Gesha">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icons/gesha.svg">
  <link rel="apple-touch-icon" sizes="256x256" href="icons/gesha@1x.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/gesha@2x.png">
  <link rel="apple-touch-icon" sizes="768x768" href="icons/gesha@3x.png">
  <title>Gesha</title>
  <link rel="stylesheet" href="main.css">
  <script type="module" src="main.js"></script>
</head>

<body>
  <main>
    <header class="Header">
      <h1 class="Header_Heading">Gesha</h1>
    </header>
    <div class="TileContainer">
      <!-- <section class="Tile --full"></section> -->
      <section class="Tile">
        <p class="Tile_Title">Current</p>
        <p class="Tile_Value --deg-c" id="temp">67.60</p>
        <p class="Tile_Subtext"><span id="tempLag">0</span>ms ago</p>
      </section>
      <section class="Tile">
        <p class="Tile_Title">Target</p>
        <input type="number" class="Tile_Value --editable --deg-c" id="targetTemp" value="100">
        <button class="Tile_Button" id="setTargetTemp">Set</button>
      </section>
      <section class="Tile">
        <p class="Tile_Title">PID</p>
        <p class="Tile_Value" id="pidRunning">Off</p>
        <button class="Tile_Button" id="togglePID">Toggle</button>
      </section>
      <section class="Tile">
        <p class="Tile_Title">Heat</p>
        <p class="Tile_Value" id="heating">Off</p>
        <button class="Tile_Button">Toggle</button>
      </section>
    </div>
    <div class="Toast" id="toast"><!-- For pop-up toast message --></div>
  </main>
</body>

</html>
